<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chiara e Fer</title>
    <meta name="description" content="Chiara e Fer wedding website" />
    <script>
      // GitHub Pages SPA redirect
      // When a 404 is hit, encode the path into a query param and redirect to /
      // The script in index.html will decode it and restore the URL via history.replaceState
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1).join('/') + '/?p=' +
        encodeURIComponent(l.pathname + l.search) +
        (l.hash || '')
      );
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
